plugins {
    id 'com.android.application'
    id 'kotlin-android'
    // CRITICAL: This allows the app to "read" your google-services.json
    id 'com.google.gms.google-services' 
}

android {
    namespace 'com.sweetdata.vpn'
    compileSdk 34

    defaultConfig {
        applicationId "com.sweetdata.vpn"
        // Required for modern VPN libraries
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        // ANTI-CRASH: VPN cores need specific CPU instructions
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
        }
    }

    // --- FIX FOR LARGE AAR RESOURCES ---
    aaptOptions {
        // This stops the compiler from failing on large/complex library resources
        noCompress 'aar'
        ignoreAssetsPattern "!.svn:!.git:!.ds_store:!*.scc:.*:<dir>_*:!CVS:!thumbs.db:!picasa.ini:!*~"
    }

    // --- LINKED TO YOUR GITHUB ACTIONS KEYSTORE ---
    signingConfigs {
        release {
            storeFile file("release-key.jks")
            storePassword System.getenv("KEYSTORE_PASSWORD")
            keyAlias System.getenv("KEY_ALIAS")
            keyPassword System.getenv("KEY_PASSWORD")
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            // Ensures debug builds don't fail on resource processing
            aaptOptions.cruncherEnabled = false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    // PREVENT BUILD ERRORS: V2Ray libs often have duplicate license files
    packagingOptions {
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
            excludes += 'META-INF/DEPENDENCIES'
            excludes += 'META-INF/LICENSE*'
            excludes += 'META-INF/NOTICE*'
            excludes += 'META-INF/*.kotlin_module'
        }
    }

    // Force specific versions to avoid conflicts between V2Ray and your other libs
    configurations.all {
        resolutionStrategy {
            force 'androidx.core:core-ktx:1.12.0'
        }
    }
}

// ADDRESS BOOK: Tells the app where to find all libraries
repositories {
    google()
    mavenCentral()
    // This trick allows Gradle to "see" your 53MB .aar from the libs folder
    flatDir {
        dirs 'libs'
    }
}

dependencies {
    // --- THE VPN ENGINE (Your 53MB Release File) ---
    // Make sure the name here matches exactly what your GitHub Action downloads
    implementation(files("libs/libv2ray.1.aar"))

    // Core Android Libraries
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.core:core-splashscreen:1.0.1'

    // Networking & JSON
    implementation "com.squareup.okhttp3:okhttp:4.12.0"
    implementation "com.squareup.okio:okio:3.6.0"
    implementation 'com.google.code.gson:gson:2.10.1'

    // Ads & Rewards
    implementation 'com.google.android.gms:play-services-ads:23.0.0'
    
    // Local Storage
    implementation 'androidx.preference:preference-ktx:1.2.1'

    // Kotlin Standard Library
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"

    // Firebase (Using BoM for version harmony)
    implementation platform('com.google.firebase:firebase-bom:33.1.0')
    implementation 'com.google.firebase:firebase-auth'
    implementation 'com.google.firebase:firebase-database'
    implementation 'com.google.firebase:firebase-installations'

    // Play Services Auth (Google Login)
    implementation 'com.google.android.gms:play-services-auth:21.1.1'

    // Testing
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
