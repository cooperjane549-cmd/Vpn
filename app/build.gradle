plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

android {
    namespace 'com.sweetdata.vpn'
    compileSdk 34

    defaultConfig {
        applicationId "com.sweetdata.vpn"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    // FIXES THE JVM-TARGET 1.8 vs 17 ERROR
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    // Core Android Libraries
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.core:core-splashscreen:1.0.1'

    // Networking & Injection (CRITICAL FOR THE VPN)
    // OkHttp handles the WebSocket handshake and the "Host" header injection
    implementation("com.squareup.okhttp3:okhttp:4.12.0")
    // Okio is used for fast data streaming between the phone and VPS
    implementation("com.squareup.okio:okio:3.6.0")
    // Gson for reading any configuration files from your server
    implementation 'com.google.code.gson:gson:2.10.1'

    // Ads & Rewards (For earning MBs)
    implementation 'com.google.android.gms:play-services-ads:23.0.0'
    
    // Local Storage (To save if the user is on Safaricom or Airtel manually)
    implementation 'androidx.preference:preference-ktx:1.2.1'

    // Kotlin Standard Library
    implementation "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"

    // Testing
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}
