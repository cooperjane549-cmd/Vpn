name: Build SweetData VPN APK

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Debug: show files (optional, helps verify gradlew exists)
      - name: Debug repository
        run: |
          echo "Current directory: $(pwd)"
          ls -R
          find . -name "gradlew"

      # 3. Setup JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. Make gradlew executable
      - name: Make Gradle executable
        run: chmod +x ./gradlew

      # 6. Build APK for :app module (which points to Vpn/app)
      - name: Build APK
        run: ./gradlew :app:assembleDebug

      # 7. Show APK (debug step)
      - name: Find APK
        run: find . -name "*.apk"

      # 8. Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SweetData-VPN
          path: Vpn/app/build/outputs/apk/debug/app-debug.apk
