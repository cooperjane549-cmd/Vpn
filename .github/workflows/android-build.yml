name: Build SweetData VPN APK

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # MOVED SECRETS HERE: Now the 'signingReport' can see the Alias and Passwords
    env:
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      # 1. Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Show repo structure
      - name: Show repo structure
        run: ls -R

      # 3. Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. Set up Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. Make gradlew executable
      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      # 6. Decode Keystore from Secrets
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release-key.jks

      # 7. Get SHA-1 and SHA-256 signatures for Firebase
      # This will now show the real keys instead of "null"
      - name: Get Signature Report
        run: ./gradlew signingReport

      # 8. Build Debug APK
      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug

      # 9. Build Signed Release APK
      - name: Build Release APK
        run: ./gradlew :app:assembleRelease

      # 10. Upload Debug APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SweetData-VPN-Debug
          path: app/build/outputs/apk/debug/app-debug.apk

      # 11. Upload Release APK
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: SweetData-VPN-Release
          path: app/build/outputs/apk/release/app-release.apk
          
