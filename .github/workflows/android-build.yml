name: Build SweetData VPN APK

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Show file structure (optional, for debugging)
      - name: Show repo structure
        run: ls -R

      # 3. Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. Set up Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. Make gradlew executable
      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      # 6. Build APK
      - name: Build Debug APK
        run: ./gradlew :Vpn:app:assembleDebug

      # 7. Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SweetData-VPN-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
