name: Build SweetData VPN APK

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Show repo structure (debug)
      - name: Show file structure
        run: ls -R

      # 3. Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. Set up Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. Make gradlew executable (handles nested folder)
      - name: Make Gradle Wrapper Executable
        run: |
          if [ -f "./gradlew" ]; then chmod +x ./gradlew; fi
          if [ -f "./Vpn/gradlew" ]; then chmod +x ./Vpn/gradlew; fi

      # 6. Build APK (handles nested folder)
      - name: Build APK
        run: |
          if [ -f "./gradlew" ]; then ./gradlew assembleDebug; fi
          if [ -f "./Vpn/gradlew" ]; then cd Vpn && ./gradlew assembleDebug; fi

      # 7. Find APKs for upload
      - name: Find APKs
        run: find . -name "*.apk"

      # 8. Upload all APKs found
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: SweetData-VPN
          path: '**/*.apk'
