name: Build SweetData VPN APK

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Show repo structure (debug)
      - name: Show file structure
        run: ls -R

      # 3. Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. Set up Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. Make gradlew executable (root)
      - name: Make Gradle Wrapper Executable
        run: chmod +x ./gradlew

      # 6. Build the app module (nested Vpn/app)
      - name: Build APK
        run: ./gradlew :app:assembleDebug -p Vpn

      # 7. Debug: List all APKs
      - name: List all APKs
        run: find . -name "*.apk"

      # 8. Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SweetData-VPN
          path: Vpn/app/build/outputs/apk/debug/*.apk
