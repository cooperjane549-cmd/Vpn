name: Build SweetData VPN APK

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      # --- DOWNLOAD STEP ---
      - name: Download V2Ray Engine
        shell: bash
        run: |
          mkdir -p app/libs
          echo "Downloading 53MB engine from Public Release..."
          # -L follows redirects, -f fails the build if the link returns 404
          curl -L -f "https://github.com/cooperjane549-cmd/Vpn/releases/download/v1.0/libv2ray.1.aar" -o app/libs/libv2ray.1.aar || { echo "DOWNLOAD FAILED - Check the URL or Filename"; exit 1; }

      - name: Verify Downloaded File
        run: |
          echo "Checking file size and type..."
          ls -lh app/libs/libv2ray.1.aar
          # If this shows 'Zip archive data', we have won.
          file app/libs/libv2ray.1.aar

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release-key.jks

      - name: Build Debug APK
        # 'clean' ensures we don't use old corrupted cache data
        run: ./gradlew clean :app:assembleDebug

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SweetData-VPN-Debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: SweetData-VPN-Release
          path: app/build/outputs/apk/release/app-release.apk
          
