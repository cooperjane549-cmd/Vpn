name: Build SweetData VPN APK

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle Wrapper Executable
        run: chmod +x gradlew

      - name: Download V2Ray Engine
        shell: bash
        run: |
          mkdir -p app/libs
          echo "Downloading 53MB engine from Public Release..."
          curl -L -f "https://github.com/cooperjane549-cmd/Vpn/releases/download/v1.0/libv2ray.1.aar" -o app/libs/libv2ray.1.aar || { echo "DOWNLOAD FAILED"; exit 1; }

      # --- THE "ROOT CAUSE" DISCOVERY STEP ---
      - name: X-Ray the Library (Find Real Function Names)
        run: |
          echo "Extracting class list from AAR..."
          unzip -p app/libs/libv2ray.1.aar classes.jar > engine_classes.jar
          echo "--- START OF LIBRARY MANUAL ---"
          # This command prints all valid function names inside the Libv2ray class
          javap -cp engine_classes.jar libv2ray.Libv2ray || echo "Class libv2ray.Libv2ray not found"
          echo "--- END OF LIBRARY MANUAL ---"

      - name: Verify Downloaded File
        run: |
          ls -lh app/libs/libv2ray.1.aar
          file app/libs/libv2ray.1.aar

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release-key.jks

      - name: Build Debug APK
        run: ./gradlew clean :app:assembleDebug

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SweetData-VPN-Debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: SweetData-VPN-Release
          path: app/build/outputs/apk/release/app-release.apk
          
